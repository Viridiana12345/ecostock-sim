{% extends 'base.html' %}
{% block title %}Eliminar producto{% endblock %}
{% block content %}
<div class="simple-center">
  <form method="post" class="card form-card small-form">
    {% csrf_token %}
    <h2>Eliminar producto</h2>
    <p>¿Seguro que deseas eliminar <strong>{{ product.name }}</strong>?</p>
    <div class="form-actions">
      <button class="btn danger-btn" type="submit">Sí, eliminar</button>
      <a class="btn btn-outline" href="/productos/">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
