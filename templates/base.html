{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EcoStock{% endblock %}</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header class="topbar">
        <div class="brand">EcoStock</div>
        <nav class="nav">
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'product_list' %}">Inventario</a>
            <a href="{% url 'product_create' %}">Nuevo producto</a>
            <a href="/admin/">Admin</a>
        </nav>
        <div>
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" style="display:inline;">
                {% csrf_token %}
                <button class="btn btn-light" type="submit">Cerrar sesión</button>
            </form>
            {% endif %}
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
