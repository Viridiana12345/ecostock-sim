<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login | EcoStock</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #e9f5ef, #f7faf9);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            display: flex;
            width: 900px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .left {
            flex: 1;
            padding: 50px;
            background: #eaf7f1;
        }

        .left h1 {
            font-size: 40px;
            margin: 0;
            color: #1f3d2b;
        }

        .left p {
            margin-top: 15px;
            color: #4b6357;
        }

        .right {
            flex: 1;
            padding: 50px;
        }

        .right h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #2f855a;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #276749;
        }

        .demo {
            margin-top: 15px;
            font-size: 14px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">

    <div class="left">
        <h1>EcoStock Sim</h1>
        <p>
            Plataforma para simular inventario y realizar pruebas de seguridad.
        </p>
    </div>

    <div class="right">
        <h2>Iniciar sesión</h2>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Usuario">
            <input type="password" name="password" placeholder="Contraseña">
            <button type="submit">Entrar</button>
        </form>

        <div class="demo">
            Demo: admin / admin123
        </div>
    </div>

</div>

</body>
</html>
